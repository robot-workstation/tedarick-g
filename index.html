<!-- index.html (Tedarick-G) -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="https://www.sescibaba.com/Data/EditorFiles/urun_resim/G.png">
  <title>Tedarick - G</title>

  <style>
    :root{
      color-scheme:dark;
      --popW:min(560px, 92vw);
      --popMaxH:calc(100vh - 24px);
      --popGap:10px;
      --popM:12px;
      --guideDur:1200ms;
    }

    html,body{min-height:100%;overflow-x:hidden}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:#0b0d12;
      color:#eaeef7;
      font-size:15px;
      overflow-y:auto;
    }

    .layout{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .siteHeader{ padding:10px 8px 0; background:#0b0d12; }
    .siteTitle{
      text-align:center;
      font-size:26px;
      font-weight:1300;
      letter-spacing:5.2px;
      padding:6px 0 8px;
    }

    aside{
      border-bottom:1px solid #1f2430;
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      background:#0b0d12;
    }

    /* ÜST BAR */
    .topRow{
      width:100%;
      display:flex;
      gap:10px;
      flex-wrap:nowrap;
      align-items:center;
      min-width:0;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:nowrap;
      align-items:center;
      flex:1 1 auto;
      min-width:0;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:thin;
    }

    .controls > *{
      flex:0 0 auto;
      min-width:0;
    }

    .ibox{
      height:36px;
      display:flex;
      align-items:center;
      gap:6px;
      padding:0 10px;
      border:1px solid #1f2430;
      border-radius:10px;
      background:#0f1320;
      flex:0 0 auto;
      max-width:50vw;
      overflow-x:auto;
      white-space:nowrap;
    }

    button,.file{
      background:#111827;
      color:#eaeef7;
      border:1px solid #2a3140;
      border-radius:10px;
      font-weight:900;
      font-size:14px;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      white-space:nowrap;
    }

    button{padding:0 12px;cursor:pointer}
    button:hover,.file:hover{background:#1f2a44;border-color:#6b7da6}
    button:disabled{opacity:.55;cursor:not-allowed}

    .file{
      padding:0 10px;
      gap:8px;
      cursor:pointer;
    }
    .file input{display:none}

    .chip{
      padding:3px 9px;
      border:1px solid #2a3140;
      border-radius:999px;
      background:#0b0d12;
      white-space:nowrap;
      font-weight:1000;
      font-size:14px;
    }
    .chip.ok{color:#86efac}
    .chip.bad{color:#fca5a5}
    .chip.unk{color:#fcd34d}
    .chip.muted{opacity:.88}

    .brandList{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:6px 10px;
      align-items:center;
    }

    .brand{
      display:inline-flex;
      align-items:center;
      padding:7px 10px;
      border:1px solid #1f2430;
      border-radius:12px;
      background:#0f1320;
      cursor:pointer;
    }
    .brand:hover{border-color:#2a3140}
    .brand.sel{background:#1f2a44;border-color:#6b7da6}

    .panel{display:flex;flex-direction:column;gap:6px}
    .tableWrap{
      overflow-y:auto;
      overflow-x:hidden;
      border:1px solid #1f2430;
      border-radius:12px;
      background:#0f1320;
    }

    table{width:100%;border-collapse:collapse;table-layout:fixed}
    th,td{
      border-bottom:1px solid #1f2430;
      padding:9px 6px;
      text-align:center;
      font-size:14px;
    }
    th{
      position:sticky;
      top:0;
      background:#0b0d12;
      font-weight:1100;
    }

    .modal{
      position:fixed;inset:0;display:none;
      background:rgba(0,0,0,.55);
      z-index:60;
      padding:18px;
    }
  </style>
</head>

<body>
  <main class="layout">

    <header class="siteHeader">
      <div class="siteTitle">Tedarick-G</div>
    </header>

    <aside>
      <div class="topRow">
        <div class="controls">

          <button id="supplierBtn" class="file" type="button">
            1) Tedarikçi: Compel
          </button>

          <button id="brandHintBtn" class="file" type="button">
            2) Marka Seç
          </button>

          <label class="file">
            3) T-Soft Stok
            <input id="f2" type="file" accept=".csv,text/csv">
          </label>

          <button id="depoBtn" class="file" type="button">
            4) Aide Stok
          </button>

          <button id="go">Listele</button>

        </div>

        <div class="ibox">
          <span class="chip muted" id="brandStatus">Markalar yükleniyor…</span>
          <span class="chip ok" id="stChip" style="display:none"></span>
          <span class="chip" id="l1Chip">Compel:-</span>
          <span class="chip" id="l2Chip">T-Soft:-</span>
          <span class="chip" id="l4Chip">Aide:-</span>
          <span class="chip muted" id="sum">✓0 • ✕0</span>
        </div>
      </div>

      <div class="brandList" id="brandList"></div>
    </aside>

    <section class="maincol">
      <section class="panel results">
        <div class="tableWrap"><table id="t1"></table></div>
      </section>

      <section class="panel unmatched" id="unmatchedSection" style="display:none">
        <div class="tableWrap"><table id="t2"></table></div>
      </section>
    </section>

  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
